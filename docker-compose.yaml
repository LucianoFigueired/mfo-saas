services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: zelo-api
    ports:
      - "3001:3001"
      - "9229:9229"
    environment:
      - FRONTEND_URL=${FRONTEND_URL}
      - DATABASE_URL=${DATABASE_URL}
      - DIRECT_URL=${DIRECT_URL}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - NODE_ENV=development
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/api/node_modules
      - /app/packages/database/node_modules
      - /app/packages/common/node_modules
    command: >
      sh -c "
        echo '🚀 Gerando Prisma Client...' &&
        pnpm --filter @mfo/database exec prisma generate &&
        
        echo '🔄 Aplicando Migrações (Neon DB)...' &&
        pnpm --filter @mfo/database exec prisma migrate deploy &&
        
        echo '🔧 Criando entrypoint index.js...' &&
        echo \"module.exports = require('@prisma/client');\" > packages/database/index.js &&
        
        echo '🟢 Iniciando NestJS com Webpack...' &&
        pnpm --filter @mfo/api run start:dev
      "
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: zelo-web
    ports:
      - "3000:3000"
    depends_on:
      - api
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
      - NODE_ENV=development
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/web/node_modules
      - /app/apps/web/.next
    command: pnpm --filter web run dev
